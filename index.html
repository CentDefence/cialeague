<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIA League</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0b0b14;
    color: white;
    overflow-x: hidden;
}

/* SOFT BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 150%;
    height: 150%;
    background:
        radial-gradient(circle at 20% 30%, rgba(120,0,255,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,0,80,0.25), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(0,100,255,0.25), transparent 40%);
    filter: blur(120px);
    z-index: -1;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(15,15,25,0.7);
    backdrop-filter: blur(10px);
}

.logo {
    font-weight: 800;
    font-size: 22px;
    background: linear-gradient(90deg,#8a2eff,#ff2a6d,#2a7bff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

nav a {
    margin: 0 12px;
    cursor: pointer;
    color: #aaa;
    transition: 0.3s;
}

nav a:hover {
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px 60px;
}

.hero h1 {
    font-size: 52px;
    margin-bottom: 10px;
    background: linear-gradient(90deg,#8a2eff,#ff2a6d,#2a7bff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    color: #aaa;
    margin-bottom: 25px;
}

.join-btn {
    padding: 14px 35px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(90deg,#8a2eff,#2a7bff);
    color: white;
    transition: 0.3s;
}

.join-btn:hover {
    transform: scale(1.08);
}

/* TEXT BLOCK */
.info {
    text-align: center;
    max-width: 700px;
    margin: auto;
    padding: 40px 20px;
    color: #bbb;
    line-height: 1.6;
}

.date {
    margin-top: 15px;
    font-size: 18px;
    color: white;
}

/* SOON POPUP */
.soon {
    position: fixed;
    top: 20px;
    right: -200px;
    padding: 12px 25px;
    border-radius: 10px;
    background: linear-gradient(90deg,#8a2eff,#ff2a6d);
    transition: 0.5s;
    font-weight: 600;
}

.soon.show {
    right: 20px;
}

</style>
</head>

<body>

<header>
    <div class="logo">CIA LEAGUE</div>
    <nav>
        <a onclick="showSoon()">Home</a>
        <a onclick="showSoon()">League</a>
        <a onclick="showSoon()">Teams</a>
    </nav>
</header>

<div class="hero">
    <h1>CIA LEAGUE</h1>
    <p>Join the new era</p>
    <button class="join-btn" onclick="join()">Join Now !</button>
</div>

<div class="info">
    Это будет лучшая лига, где определится кто сильнейший в СНГ.  
    Sqvnix и Polcovodec возвращают легенду — CIA.
    
    <div class="date">14.01.26</div>
</div>

<div class="soon" id="soon">SOON</div>

<script>
function showSoon() {
    const el = document.getElementById("soon");
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2000);
}

function join() {
    window.location.href = "https://discord.gg/WXKUCSwv";
}
</script>

</body>
</html>
