<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIA League</title>

<style>

/* BASE */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #050816;
    color: white;
    overflow-x: hidden;
}

/* ANIMATED BG */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 40%, #0044ff, transparent 40%),
                radial-gradient(circle at 80% 70%, #ff0000, transparent 40%);
    filter: blur(140px);
    animation: bgMove 12s infinite alternate;
    z-index: -1;
}

@keyframes bgMove {
    0% { transform: translate(0,0); }
    100% { transform: translate(-200px, -100px); }
}

/* HEADER */
header {
    position: fixed;
    width: 100%;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(12px);
    background: rgba(5,8,22,0.7);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(90deg, #00aaff, #0044ff, #00aaff);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 4s linear infinite;
}

@keyframes glow {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #ccc;
    transition: 0.3s;
}

nav a:hover {
    color: #00aaff;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    background: radial-gradient(circle at center, rgba(0,80,255,0.2), transparent 70%);
}

.hero h1 {
    font-size: 70px;
    background: linear-gradient(90deg, #00aaff, #0044ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    color: #aaa;
    margin-top: 10px;
}

.hero button {
    margin-top: 25px;
    padding: 14px 40px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #0044ff, #00aaff);
    background-size: 200%;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    background-position: right;
    transform: scale(1.08);
}

/* SECTIONS */
.section {
    padding: 120px 40px;
    text-align: center;
}

.section h2 {
    font-size: 36px;
    margin-bottom: 50px;
    background: linear-gradient(90deg, #00aaff, #0044ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* CARDS GRID */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

/* CARD */
.card {
    padding: 40px 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0,170,255,0.2);
    position: relative;
    overflow: hidden;
    transition: 0.4s;
}

.card::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, #00aaff, transparent);
    animation: shine 5s linear infinite;
    opacity: 0.15;
}

@keyframes shine {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.card:hover {
    transform: translateY(-12px) scale(1.03);
    border: 1px solid #00aaff;
}

/* CTA BLOCK */
.cta {
    margin: 100px auto;
    max-width: 800px;
    padding: 60px;
    border-radius: 25px;
    background: linear-gradient(135deg, rgba(0,100,255,0.2), rgba(0,0,0,0.3));
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0,170,255,0.3);
}

.cta h2 {
    font-size: 40px;
}

.cta button {
    margin-top: 20px;
    padding: 15px 40px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #0044ff, #00aaff);
    cursor: pointer;
}

/* SCROLL ANIM */
.fade {
    opacity: 0;
    transform: translateY(60px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* FOOTER */
footer {
    padding: 40px;
    text-align: center;
    color: #777;
}

</style>
</head>

<body>

<header>
    <div class="logo">CIA</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">League</a>
        <a href="#">Teams</a>
        <a href="#">Join</a>
    </nav>
</header>

<section class="hero">
    <h1>CIA LEAGUE</h1>
    <p>Next-gen football simulation platform</p>
    <button>START NOW</button>
</section>

<section class="section fade">
    <h2>Leagues</h2>
    <div class="cards">
        <div class="card"><h3>Premier Division</h3></div>
        <div class="card"><h3>Championship</h3></div>
        <div class="card"><h3>International Cup</h3></div>
    </div>
</section>

<section class="section fade">
    <h2>Features</h2>
    <div class="cards">
        <div class="card"><h3>Real Matches</h3></div>
        <div class="card"><h3>Live Stats</h3></div>
        <div class="card"><h3>Competitive System</h3></div>
    </div>
</section>

<section class="cta fade">
    <h2>Join CIA League Today</h2>
    <p>Compete with the best players</p>
    <button>REGISTER</button>
</section>

<footer>
    © 2026 CIA League
</footer>

<script>
const f = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
    f.forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
